<!doctype html>
<html>
<head><title>Shipping Cost Calculator</title></head>
<body>
<h1>Shipping Cost Calculator</h1>
<select id="country" onchange="
  var costs = {US: '$5', CA: '$12', UK: '$9'};
  document.getElementById('cost').innerText = costs[this.value];
">
  <option value="US">United States</option>
  <option value="CA">Canada</option>
  <option value="UK">United Kingdom</option>
</select>
<p>Shipping cost: <span id="cost">$5</span></p>
</body>
</html>
